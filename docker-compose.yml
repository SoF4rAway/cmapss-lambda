services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: ruok,srvr,stat,mntr
    networks:
      - lambda_net
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8080/commands/ruok" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xms512M -Xmx1G"
    networks:
      - lambda_net
    deploy:
      resources:
        limits:
          memory: 1.5G
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-setup:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-setup
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - lambda_net
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      cub kafka-ready -b kafka:29092 1 30
      echo 'Creating kafka topics...'
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 \
        --partitions 4 --replication-factor 1 --topic cmapss_telemetry
      echo 'Successfully created the following topics:'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    # partitions=4 aligns with default Spark parallelism; single partition
    # was a bottleneck when unit_id key space grows beyond a handful of engines.

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: always
    ports:
      - "9870:9870"
    environment:
      - CLUSTER_NAME=lambda-cluster
    env_file:
      - ./env/hadoop.env
    networks:
      - lambda_net
    deploy:
      resources:
        limits:
          memory: 1.5G
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9870" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: always
    depends_on:
      namenode:
        condition: service_healthy
    env_file:
      - ./env/hadoop.env
    networks:
      - lambda_net
    deploy:
      resources:
        limits:
          memory: 1.5G
    volumes:
      - hadoop_datanode:/hadoop/dfs/data

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: custom-spark:3.5.0
    container_name: spark-master
    depends_on:
      kafka:
        condition: service_healthy
      namenode:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_DAEMON_MEMORY=1G
    networks:
      - lambda_net
    deploy:
      resources:
        limits:
          memory: 4G
    working_dir: /app
    volumes:
      - ./:/app
    healthcheck:
      test: [ "CMD", "/opt/bitnami/python/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  spark-worker:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: custom-spark:3.5.0
    container_name: spark-worker
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_WEBUI_PORT=8081
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_DAEMON_MEMORY=1G
      - SPARK_WORKER_MEMORY=1G
    networks:
      - lambda_net
    deploy:
      resources:
        limits:
          memory: 4G
    working_dir: /app
    volumes:
      - ./:/app

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx2g
    ports:
      - "9200:9200"
    networks:
      - lambda_net
    deploy:
      resources:
        limits:
          memory: 2.5G
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 45s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.2
    container_name: kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - lambda_net
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  lambda_net:
    driver: bridge

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  hadoop_namenode:
  hadoop_datanode:
  elasticsearch_data:
